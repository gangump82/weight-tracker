<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="scaleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F3F4F6"/>
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- 体重秤主体 -->
  <ellipse cx="256" cy="280" rx="140" ry="100" fill="url(#scaleGrad)" opacity="0.95"/>

  <!-- 秤面圆盘 -->
  <circle cx="256" cy="250" r="80" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="3"/>

  <!-- 刻度 -->
  <g stroke="#9CA3AF" stroke-width="2">
    <line x1="256" y1="180" x2="256" y2="190"/>
    <line x1="196" y1="250" x2="206" y2="250"/>
    <line x1="306" y1="250" x2="316" y2="250"/>
    <line x1="256" y1="310" x2="256" y2="320"/>
  </g>

  <!-- 指针 -->
  <line x1="256" y1="250" x2="280" y2="220" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round"/>
  <circle cx="256" cy="250" r="8" fill="#8B5CF6"/>

  <!-- 装饰火焰 -->
  <g transform="translate(340, 120)">
    <path d="M0 40 Q10 20 5 0 Q15 25 25 15 Q20 35 30 50 Q15 45 0 40" fill="#F97316" opacity="0.9"/>
  </g>

  <!-- 装饰星星 -->
  <g fill="#FCD34D" opacity="0.8">
    <polygon points="120,100 124,112 136,112 126,120 130,132 120,124 110,132 114,120 104,112 116,112"/>
  </g>

  <!-- 底部文字区域 -->
  <rect x="176" y="340" width="160" height="36" rx="18" fill="rgba(255,255,255,0.2)"/>
  <text x="256" y="365" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">体重管家</text>
</svg>