name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Get dependencies
      run: |
        cd flutter
        flutter pub get
      
    - name: Build APK
      run: |
        cd flutter
        flutter build apk --release
    
    - name: Build Web
      run: |
        cd flutter
        flutter build web --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: weight-tracker-flutter-android
        path: flutter/build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
    
    - name: Upload Web
      uses: actions/upload-artifact@v4
      with:
        name: weight-tracker-flutter-web
        path: flutter/build/web
        retention-days: 30
