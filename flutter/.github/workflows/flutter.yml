name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Get dependencies
      run: |
        cd weight-tracker-flutter
        flutter pub get
      
    - name: Build APK
      run: |
        cd weight-tracker-flutter
        flutter build apk --release
    
    - name: Build iOS (no codesign)
      run: |
        cd weight-tracker-flutter
        flutter build ios --release --no-codesign
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: weight-tracker-flutter-android
        path: weight-tracker-flutter/build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
    
    - name: Upload iOS
      uses: actions/upload-artifact@v4
      with:
        name: weight-tracker-flutter-ios
        path: weight-tracker-flutter/build/ios/iphoneos/Runner.app
        retention-days: 30
